        // 상태: 부재 > todayStatus > dayStatus > 미선택
        let displayStatus=away?(awInfo?.type||'부재'):(r.todayStatus||r.dayStatus||'미선택');
        let stBg=away?'#e3f2fd':(displayStatus&&displayStatus!=='미선택'?'#e3f2fd':'#ffebee');

        row.append(h('div',{style:{textAlign:'left',fontWeight:700}},r.name));

    // 이 날짜 다운로드 (일일근태 / 주간연장 분리)

    dlBtns.append(h('button',{className:'btn',style:{flex:1,padding:'11px',borderRadius:'11px',fontSize:'12px',background:'#FFF3E0',color:'#E65100',border:'1px solid #FFE0B2'},onClick:()=>{const dk=S.historyView;const d=new Date(dk);const day=d.getDay()||7;d.setDate(d.getDate()-day+1);dlHistoryWeekly(dateKey(d));}},'📥 주간연장'));

  // 3개월 전 날짜
  const threeMonthsAgo=new Date(S.simTime);threeMonthsAgo.setMonth(threeMonthsAgo.getMonth()-3);
  const filteredWeeks=allWeeks.filter(wk=>new Date(wk)>=threeMonthsAgo);

  filteredWeeks.forEach(weekKey=>{
    const days=getWeekDays(weekKey);

    // 주간 연장 합계 계산

      if(rec)rec.forEach(r=>{weekOT+=(r.overtime||0);});

    // 주간 다운로드 버튼

    card.append(wkDl);
    w.append(card);
  });

  root.append(w);
}

// 과거 기록 — 일일근태 엑셀 다운로드 (양식 기반)
async function dlHistoryDaily(dayKey,record){
  const d=new Date(dayKey);
  const dn=['일','월','화','수','목','금','토'];
  const allMembers=getMembers();
  try{
    const resp=await fetch('./일일근태.xlsx');
    if(!resp.ok)throw new Error('no file');
    const buf=await resp.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellStyles:true,cellNF:true,cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];
    
    // 양식 기존 데이터 행 비우기
    for(let r=6;r<=90;r++){
      for(let c=0;c<=29;c++){
        const addr=XLSX.utils.encode_cell({r,c});
        if(ws[addr]){delete ws[addr].v;delete ws[addr].w;delete ws[addr].f;ws[addr].t='s';ws[addr].v='';}
      }
    }
    
    ws['B3']={t:'s',v:dayKey};
    allMembers.forEach((m,i)=>{
      const r=6+i; // 0-indexed row
      setCellNum(ws,r,1,i+1);
      setCellStr(ws,r,2,'AF');
      setCellStr(ws,r,3,m.dept||'');
      setCellStr(ws,r,4,m.part||m.dept||'');
      setCellStr(ws,r,5,m.name);
      setCellStr(ws,r,6,m.rank||'');
      setCellStr(ws,r,7,m.type||'정규');
      // record에서 매칭
      const rec=record?record.find(rv=>rv.id===m.id||rv.name===m.name):null;
      // 부재 체크
      let awayStatus=null;
      if(isAway(m.id,d)){
        const ai=getAway(m.id,d);
        awayStatus=ai?.type||null;
      }
      const st=awayStatus||rec?.todayStatus||rec?.dayStatus;
      if(st&&STATUS_COL_MAP[st])setCellStr(ws,r,STATUS_COL_MAP[st]-1,'O');
    });
    const styleLastRow=6+allMembers.length-1;
    ws['!ref']=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:styleLastRow+2,c:29}});
    applyDailyAttendanceStyle(ws,styleLastRow);
    XLSX.writeFile(wb,'일일근태_'+dayKey+'('+dn[d.getDay()]+').xlsx',{bookSST:true,bookType:'xlsx',cellStyles:true});
  }catch(e){
    const allCols=['결근','미출','조퇴','외근','직출','국내출장','해외출장','자가격리','교육연수','야간근무','연차','오전반차','오후반차','경조휴가','장기휴가','일반휴직','출산휴직','육아휴직','병가휴직'];
    let csv="\uFEFF일일근태_AF사업부\n"+dayKey+"\nNO,사업부,팀,Part,이름,직위,형태,";
    allCols.forEach(c=>{csv+=c+",";});csv+="출근,퇴근,연장\n";
    allMembers.forEach((m,i)=>{const rec=record?record.find(rv=>rv.id===m.id||rv.name===m.name):null;const st=rec?.dayStatus||'';csv+=(i+1)+",AF,"+(m.dept||'')+","+(m.part||'')+","+m.name+","+(m.rank||'')+","+(m.type||'');allCols.forEach(c=>{csv+=","+(st===c?"O":"");});csv+=","+(rec?.clockIn||'')+","+(rec?.clockOut||'')+","+(rec?.overtime||'')+"\n";});
    const b=new Blob([csv],{type:"text/csv;charset=utf-8;"}),a=document.createElement("a");a.href=URL.createObjectURL(b);a.download='일일근태_'+dayKey+'.csv';a.click();
  }
}

// 과거 기록 — 주간 연장근무 엑셀 다운로드 (양식 기반)
async function dlHistoryWeekly(weekKey){
  const weekDates=[];
  const d0=new Date(weekKey);
  for(let i=0;i<7;i++){const dd=new Date(d0);dd.setDate(d0.getDate()+i);weekDates.push(dd);}
  const dayLabels=['월','화','수','목','금','토','일'];
  const members=getMembers().filter(m=>m.type!=='작업자');
  
  try{
    const resp=await fetch('./연장근무.xlsx');
    if(!resp.ok)throw new Error('no file');
    const buf=await resp.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellStyles:true,cellNF:true,cellDates:true});
    
    function getTemplateName(dt){
      if(isHoliday(dt))return '공휴일';
      if(dt.getDay()===6)return '토요일';
      if(dt.getDay()===0)return '일요일';
      return '평일';
    }
    
    const nextSheets={};
    const nextNames=[];
    
    // 기준 시트 유지
    if(wb.Sheets['기준']){
      nextSheets['기준']=wb.Sheets['기준'];
      nextNames.push('기준');
    }
    
    // 날짜별 시트 생성 (월~일 7일)
    weekDates.forEach(dt=>{
      const tplName=getTemplateName(dt);
      const tplWs=wb.Sheets[tplName];
      if(!tplWs)return;
      
      const ws=cloneSheetObj(tplWs);
      
      // 양식 기존 데이터 행 전체 비우기
      for(let row=6;row<=39;row++){
        for(let c=1;c<=18;c++){
          const addr=XLSX.utils.encode_cell({r:row,c});
          if(ws[addr]){delete ws[addr].v;delete ws[addr].w;delete ws[addr].f;ws[addr].t='s';ws[addr].v='';}
        }
      }
      
      // B3 = 날짜
      setCellStr(ws,2,1,dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'));
      
      // 각 직원 데이터
      members.forEach((m,i)=>{
        const row=6+i;
        setCellNum(ws,row,1,i+1);
        setCellStr(ws,row,2,m.part||m.dept||'');
        setCellStr(ws,row,3,m.name||'');
        setCellStr(ws,row,4,m.rank||'');
        setCellStr(ws,row,5,m.type||'정규');
        
        // 부재 체크
        if(isAway(m.id,dt)){
          const ai=getAway(m.id,dt);
          setCellStr(ws,row,13,ai?.type||'부재');
          setCellStr(ws,row,17,ai?.type||'부재');
          return;
        }
        
        const dk=dateKey(dt);
        const isOffDate=isOffDay(dt);
        let clockIn='',clockOut='';
        let hasData=false;
        
        if(isOffDate){
          // 주말/공휴일: weekendTimeMap 확인
          const dayRec=localStorage.getItem('day_'+dk);
          if(dayRec){try{const recs=JSON.parse(dayRec);const rec=recs.find(r=>r.id===m.id||r.name===m.name);
            if(rec?.weekendTimeMap&&rec.weekendTimeMap[dk]){
              clockIn=rec.weekendTimeMap[dk].clockIn||'';
              clockOut=rec.weekendTimeMap[dk].clockOut||'';
              hasData=!!(clockIn&&clockOut);
            }
          }catch(e){}}
          // 전일 투표의 weekendTimeMap도 확인
          if(!hasData){
            for(let back=1;back<=5;back++){
              const prevDk=dateKey(new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()-back));
              const raw2=localStorage.getItem('day_'+prevDk);
              if(raw2){try{const recs2=JSON.parse(raw2);const rec2=recs2.find(r=>r.id===m.id||r.name===m.name);
                if(rec2?.weekendTimeMap&&rec2.weekendTimeMap[dk]){
                  clockIn=rec2.weekendTimeMap[dk].clockIn||'';clockOut=rec2.weekendTimeMap[dk].clockOut||'';
                  hasData=!!(clockIn&&clockOut);if(hasData)break;
                }
              }catch(e){}}
            }
          }
        } else {
          // 평일
          clockIn='08:30';clockOut='17:30';
          const dayRec=localStorage.getItem('day_'+dk);
          if(dayRec){try{const recs=JSON.parse(dayRec);const rec=recs.find(r=>r.id===m.id||r.name===m.name);
            if(rec?.clockIn)clockIn=rec.clockIn;
            if(rec?.clockOut)clockOut=rec.clockOut;
          }catch(e){}}
          hasData=true;
        }
        
        let dayStatus='출근';
        const dayRec2=localStorage.getItem('day_'+dk);
        if(dayRec2){try{const recs=JSON.parse(dayRec2);const rec=recs.find(r=>r.id===m.id||r.name===m.name);
          if(rec?.todayStatus)dayStatus=rec.todayStatus;
          else if(rec?.dayStatus)dayStatus=rec.dayStatus;
        }catch(e){}}
        
        if(hasData&&clockIn&&clockOut){
          setCellTime(ws,row,6,clockOut);   // G 확정 퇴근
          setCellTime(ws,row,8,clockIn);    // I 실제 출근
          setCellTime(ws,row,9,clockOut);   // J 실제 퇴근
          setCellTime(ws,row,14,clockOut);  // O 담당자 신청 퇴근
          // K열: 연장시간 직접 계산
          const ot=calcOvertime(clockIn,clockOut);
          setCellNum(ws,row,10,ot);
        }
        
        // N열: 전일 업무내용
        const prev=new Date(dt.getFullYear(),dt.getMonth(),dt.getDate()-1);
        if(isAway(m.id,prev)){const ai=getAway(m.id,prev);setCellStr(ws,row,13,ai?.type||'부재');}
        else if(isWeekend(prev)||isHoliday(prev)){setCellStr(ws,row,13,'휴무');}
        else{setCellStr(ws,row,13,dayStatus==='출근'?'신규 모델 관련 업무 진행':dayStatus);}
        
        // R열: 오늘 업무내용
        if(isAway(m.id,dt)){const ai=getAway(m.id,dt);setCellStr(ws,row,17,ai?.type||'부재');}
        else if(isWeekend(dt)||isHoliday(dt)){setCellStr(ws,row,17,'휴무');}
        else{setCellStr(ws,row,17,dayStatus==='출근'?'신규 모델 관련 업무 진행':dayStatus);}
      });
      
      ws['!ref']='A1:V'+(6+members.length);
      const sheetName=(dt.getMonth()+1)+'-'+dt.getDate();
      nextSheets[sheetName]=ws;
      nextNames.push(sheetName);
    });
    
    // 주 연장근무 현황 시트
    const weeklyWs=wb.Sheets['주 연장근무 현황'];
    if(weeklyWs){
      setCellStr(weeklyWs,1,1,'연장근무 합계 12시간 이내로 ('+getWeekLabel(d0)+')');
      weekDates.forEach((wd,i)=>{
        let label=dayLabels[i];
        if(isHoliday(wd))label+=' ['+getHolidayName(wd)+']';
        else if(isWeekend(wd))label+=' [휴무]';
        setCellStr(weeklyWs,2,3+i,label);
      });
      let row=3;
      members.forEach((v,mi)=>{
        setCellStr(weeklyWs,row,1,'개발팀');
        setCellStr(weeklyWs,row,2,v.name);
        let weekTotal=0;
        weekDates.forEach((wd,di)=>{
          const dk=dateKey(wd);
          if(isAway(v.id,wd)){const ai=getAway(v.id,wd);setCellStr(weeklyWs,row,3+di,ai?.type||'부재');}
          else if(isOffDay(wd)){}
          else{
            // 다음 근무일(투표일) 기록에서 출퇴근 가져오기
            const nextWorkday=new Date(wd.getFullYear(),wd.getMonth(),wd.getDate()+1);
            while(isOffDay(nextWorkday)){nextWorkday.setDate(nextWorkday.getDate()+1);}
            const voteDk=dateKey(nextWorkday);
            let clockIn=null,clockOut=null,ds=null;
            const raw=localStorage.getItem('day_'+voteDk);
            if(raw){try{const recs=JSON.parse(raw);const rec=recs.find(r=>r.id===v.id||r.name===v.name);
              if(rec){clockIn=rec.clockIn;clockOut=rec.clockOut;ds=rec.todayStatus||rec.dayStatus;}
            }catch(e){}}
            if(!clockIn&&!ds){
              const raw2=localStorage.getItem('day_'+dk);
              if(raw2){try{const recs2=JSON.parse(raw2);const rec2=recs2.find(r=>r.id===v.id||r.name===v.name);
                if(rec2){clockIn=rec2.clockIn;clockOut=rec2.clockOut;ds=rec2.todayStatus||rec2.dayStatus;}
              }catch(e){}}
            }
            if(ds&&ds!=='출근'){setCellStr(weeklyWs,row,3+di,ds);}
            else{const ot=calcOvertime(clockIn||'08:30',clockOut||'17:30');setCellNum(weeklyWs,row,3+di,ot);weekTotal+=ot;}
          }
        });
        setCellNum(weeklyWs,row,10,weekTotal);
        if(weekTotal>12)setCellStr(weeklyWs,row,11,'※초과');
        row++;
      });
      nextSheets['주 연장근무 현황']=weeklyWs;
      nextNames.push('주 연장근무 현황');
      // 주간현황 서식 적용 (row는 이 블록 안에서만 유효)
      applyWeeklySummaryStyle(weeklyWs,row-1);
    }
    
    // 날짜별 시트 서식 적용
    nextNames.forEach(name=>{
      if(name==='기준'||name==='주 연장근무 현황')return;
      const s=nextSheets[name];if(!s)return;
      applyDailyOTStyle(s,6+members.length-1);
    });

    // 워크북 재구성
    wb.Sheets=nextSheets;
    wb.SheetNames=nextNames;
    if(wb.Workbook&&Array.isArray(wb.Workbook.Sheets)){
      wb.Workbook.Sheets=nextNames.map(n=>({name:n,Hidden:(n==='기준'?1:0)}));
    }
    
    const dateRange=weekDates[0].getMonth()+1+'.'+weekDates[0].getDate()+'~'+weekDates[6].getMonth()+1+'.'+weekDates[6].getDate();
    XLSX.writeFile(wb,'연장근무_'+dateRange+'.xlsx',{bookSST:true,bookType:'xlsx',cellStyles:true});
  }catch(e){
    console.error(e);
    alert('양식 파일을 불러올 수 없습니다.\n에러: '+e.message);
  }
}

// ── MODAL ──
function rModal(root){
  const bg=h('div',{className:'modal-bg',onClick:()=>{S.modal=null;render();}});
  const box=h('div',{className:'modal',onClick:e=>e.stopPropagation()});
  if(S.modal==='away'){
    box.append(h('h2',null,'✈️ 부재 기간 등록'));
    box.append(h('div',{className:'sub'},'등록 기간 동안 알림 면제 + 투표 불필요'));

    const sel1=h('select',{onChange:e=>{S.awayForm.memberId=e.target.value;}});
    const allMembers=getMembers();
    OFFICES.forEach(office=>{

      if(!officeMembers.length)return;
      const grp=h('optgroup',{label:'🏢 '+office+' 정규직'});
      officeMembers.forEach(m=>{const o=h('option',{value:m.id},m.name+' ('+m.dept+')');if(m.id===S.awayForm.memberId)o.selected=true;grp.append(o);});
      sel1.append(grp);
    });
    // 작업자 (이름 기반)
    const dgNames=getDogeupNames();
    if(dgNames.length){
      const dgGrp=h('optgroup',{label:'👷 작업자'});
      dgNames.forEach(name=>{const o=h('option',{value:'DG_'+name},name);if(S.awayForm.memberId==='DG_'+name)o.selected=true;dgGrp.append(o);});
      sel1.append(dgGrp);
    }
    box.append(sel1);
    box.append(h('label',null,'유형'));
    const sel2=h('select',{onChange:e=>{S.awayForm.type=e.target.value;}});
    ["해외출장","연차","병가","공가","교육/세미나","기타"].forEach(t=>{const o=h('option',{value:t},t);if(t===S.awayForm.type)o.selected=true;sel2.append(o);});
    box.append(sel2);
    box.append(h('label',null,'시작일'));box.append(h('input',{type:'date',value:S.awayForm.from,onChange:e=>{S.awayForm.from=e.target.value;}}));
    box.append(h('label',null,'종료일'));box.append(h('input',{type:'date',value:S.awayForm.to,onChange:e=>{S.awayForm.to=e.target.value;}}));
    box.append(h('label',null,'메모'));box.append(h('input',{placeholder:'예) VINA 출장',value:S.awayForm.memo,onInput:e=>{S.awayForm.memo=e.target.value;}}));
    box.append(h('div',{className:'info-box',style:{background:'#e3f2fd',color:'#1565c0'}},'⏸️ 기간 내: 알림 안감 · 미투표 제외 · 현황에 부재 사유 자동 표시'));
    const btns=h('div',{style:{display:'flex',gap:'7px',marginTop:'4px'}});
    btns.append(h('button',{className:'btn',style:{flex:1,padding:'13px',background:'#f5f5f5',color:'#666',borderRadius:'11px'},onClick:()=>{S.modal=null;render();}},'취소'));
    btns.append(h('button',{className:'btn btn-brown',style:{flex:2,padding:'13px',borderRadius:'11px'},onClick:submitAway},'등록'));
    box.append(btns);
  }
  if(S.modal==='weekend'){
    box.append(h('h2',null,'💼 주말/공휴일 출근'));
    box.append(h('div',{className:'sub'},'토·일·공휴일 출근 시간을 각각 입력하세요.'));
    const options=getNearbyWeekendOptions(S.simTime);
    const selectedSet=new Set(S.weekendForm.selected||[]);
    box.append(h('label',null,'날짜 선택'));
    const list=h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'12px'}});
    options.forEach(dt=>{
      const dk=dateKey(dt);
      const selected=selectedSet.has(dk);
      const holName=isHoliday(dt)?getHolidayName(dt):null;
      const dayLabel=(dt.getMonth()+1)+'/'+dt.getDate()+' ('+['일','월','화','수','목','금','토'][dt.getDay()]+')'+(holName?' '+holName:'');
      list.append(h('button',{type:'button',className:'btn',style:{padding:'10px 8px',borderRadius:'10px',border:selected?'2px solid #003B7B':'1px solid #ddd',background:selected?'#E3F2FD':holName?'#ffebee':'white',color:selected?'#003B7B':holName?'#c62828':'#555',fontSize:'10px',fontWeight:700},onClick:()=>{
        const arr=new Set(S.weekendForm.selected||[]);
        if(arr.has(dk)){
          arr.delete(dk);
          if(S.weekendForm.entries)delete S.weekendForm.entries[dk];
        }else{
          arr.add(dk);
          S.weekendForm.entries=S.weekendForm.entries||{};
          if(!S.weekendForm.entries[dk])S.weekendForm.entries[dk]={clockIn:'',clockOut:''};
        }
        S.weekendForm.selected=[...arr].sort();
        render();
      }},dayLabel));
    });
    box.append(list);

    const selectedDates=[...(S.weekendForm.selected||[])].sort();
    if(selectedDates.length){
      box.append(h('label',null,'일자별 시간 입력'));
      const wrap=h('div',{style:{display:'flex',flexDirection:'column',gap:'10px',marginBottom:'12px'}});
      selectedDates.forEach(dk=>{
        const item=(S.weekendForm.entries&&S.weekendForm.entries[dk])||{clockIn:'',clockOut:''};
        const hours=calcHoursBetween(item.clockIn,item.clockOut);
        wrap.append(h('div',{style:{padding:'10px',border:'1px solid #eee',borderRadius:'12px',background:'#fafafa'}},
          h('div',{style:{fontSize:'12px',fontWeight:800,color:'#333',marginBottom:'8px'}}, dk),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px'}},
            h('div',null,
              h('div',{style:{fontSize:'11px',color:'#666',marginBottom:'4px'}},'출근'),
              h('input',{type:'time',value:item.clockIn||'',onInput:e=>{S.weekendForm.entries=S.weekendForm.entries||{};S.weekendForm.entries[dk]={...(S.weekendForm.entries[dk]||{}),clockIn:e.target.value};}})
            ),
            h('div',null,
              h('div',{style:{fontSize:'11px',color:'#666',marginBottom:'4px'}},'퇴근'),
              h('input',{type:'time',value:item.clockOut||'',onInput:e=>{S.weekendForm.entries=S.weekendForm.entries||{};S.weekendForm.entries[dk]={...(S.weekendForm.entries[dk]||{}),clockOut:e.target.value};}})
            )
          ),
          h('div',{style:{fontSize:'11px',color:hours>0?'#2e7d32':'#999',marginTop:'8px',fontWeight:700}},hours>0?'계산 시간: '+hours+'시간':'출근/퇴근을 모두 입력하세요.')
        ));
      });
      box.append(wrap);
    }

    box.append(h('div',{className:'info-box',style:{background:'#fffde7',color:'#666'}},'토요일, 일요일 각각 입력한 출근~퇴근 시간으로 계산되며 모두 연장근무에 포함됩니다.'));
    const btns=h('div',{style:{display:'flex',gap:'7px',marginTop:'4px'}});
    btns.append(h('button',{className:'btn',style:{flex:1,padding:'13px',background:'#f5f5f5',color:'#666',borderRadius:'11px'},onClick:()=>{S.modal=null;render();}},'취소'));
    btns.append(h('button',{className:'btn btn-brown',style:{flex:2,padding:'13px',borderRadius:'11px'},onClick:submitWeekend},'등록'));
    box.append(btns);
  }
  if(S.modal==='todayReminder'){
    box.append(h('div',{style:{textAlign:'center',marginBottom:'16px'}},
      h('div',{style:{fontSize:'48px',marginBottom:'8px'}},'📌'),
      h('h2',{style:{fontSize:'17px',fontWeight:900,marginBottom:'4px'}},'금일 근무 상태도 선택해주세요!'),
      h('div',{style:{fontSize:'13px',color:'#888',marginBottom:'16px',lineHeight:'1.6'}},'투표 완료! 👏\n\n"오늘" 탭에서 금일 출근 상태를\n선택하지 않으면 현황에 미선택으로 표시됩니다.')
    ));
    const btns=h('div',{style:{display:'flex',gap:'7px'}});
    btns.append(h('button',{className:'btn',style:{flex:1,padding:'13px',background:'#f5f5f5',color:'#666',borderRadius:'11px',fontSize:'13px'},onClick:()=>{S.modal=null;render();}},'나중에'));
    btns.append(h('button',{className:'btn btn-brown',style:{flex:2,padding:'13px',borderRadius:'11px',fontSize:'14px',fontWeight:800},onClick:()=>{S.modal=null;S.tab='today';render();}},'🏢 오늘 탭으로 이동'));
    box.append(btns);
  }
  bg.append(box);root.append(bg);
}

// ═══ 앱 시작 시 Firebase 동기화 ═══
(function initFirebaseSync(){
  // 공휴일 동기화
  loadHolidaysFromFB();
  // 작업자 명단 동기화
  db.ref('dogeupNames').once('value',snap=>{
    const data=snap.val();
    if(data){
      const arr=Array.isArray(data)?data:Object.values(data);
      if(arr.length)localStorage.setItem('dogeupNames',JSON.stringify(arr));
    }
  });
  fbLoadAway(awayList=>{
    if(awayList){
      const arr=Array.isArray(awayList)?awayList:Object.values(awayList);
      // Firebase에 데이터가 있으면 동기화, 없으면 localStorage 유지
      if(arr.length){
        S.awayPeriods=arr;
        localStorage.setItem('away',JSON.stringify(arr));
        render();
      } else {
        // Firebase가 비었지만 localStorage에 있으면 Firebase에 올려줌
        const local=JSON.parse(localStorage.getItem('away')||'[]');
        if(local.length){
          S.awayPeriods=local;
          db.ref('away').set(local);
        }
      }
    }
  });
  fbLoadMembers(memberList=>{
    if(memberList&&memberList.length){localStorage.setItem('members',JSON.stringify(memberList));localStorage.setItem('members_ver',DATA_VERSION);}
  });
  db.ref('allWeeks').once('value',snap=>{
    const data=snap.val();
    if(data){
      const weeks=Object.keys(data).sort().reverse();
      localStorage.setItem('allWeeks',JSON.stringify(weeks));
      weeks.forEach(wk=>{
        db.ref('weekIndex/'+wk).once('value',ws=>{
          const days=ws.val();
          if(days)localStorage.setItem('week_'+wk,JSON.stringify(Object.keys(days).sort()));
        });
      });
    }
  });
  const todayKey=getDayKey(new Date());
  loadDayRecordFromFB(todayKey,()=>{render();});
})();
render();
